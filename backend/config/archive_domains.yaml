        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://uinp.gov.ua (main site) or https://hdauinp.org.ua (archive)"
            - "Browse sections: About, Archives, News"
            - "Submit inquiries via email uinp@memory.gov.ua for specific records"
            - "Physical archive at Pukhovska St. 7, Kyiv (Desnianskyi district)"

