      - domain: anno.onb.ac.at
        name: "ANNO - Austrian Newspapers Online"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: FULLY_DIGITIZED
        default_protocol: SEARCH_UI_ONLY
        notes: "Austrian historical newspapers 1689-present. Full-text search for 1689-1918 and 1938-1944. Web interface only for 1945-1954 (copyright). 20M+ newspaper pages."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://anno.onb.ac.at"
            - "Use complex search at https://anno.onb.ac.at/anno-suche/complex?text={query}"
            - "Filter by date range, newspaper title, or region"
            - "1689-1918: Full-text searchable"
            - "1938-1944: Full-text searchable"
            - "1945-1954: Browse only (copyright restrictions)"

      - domain: uni-graz.at
        name: "University of Graz"
        default_access_level: PHYSICAL_OR_SUBSCRIPTION
        default_digitization_status: PARTIALLY_DIGITIZED
        default_protocol: LIBRARY_CATALOGS
        notes: "Austrian academic research on Soviet victims in Austria. Library catalog access."
        authentication:
          type: "credentials"
          username: ""
          password: ""
        access_instructions:
          type: "subscription"
          steps:
            - "Navigate to https://uni-graz.at"
            - "Access library catalog via Universitätsbibliothek"
            - "Some resources require institutional login or guest registration"
            - "Physical materials available at university library in Graz"

      - domain: adbik.at
        name: "AdBIK Graz - Ludwig Boltzmann Institute Archive"
        default_access_level: PHYSICAL_OR_SUBSCRIPTION
        default_digitization_status: PARTIALLY_DIGITIZED
        default_protocol: LIBRARY_CATALOGS
        notes: "Soviet operations Austria 1945-1955. NKVD/KGB materials. Part of Ludwig Boltzmann Institute for War Consequences Research."
        authentication:
          type: "credentials"
          username: ""
          password: ""
        access_instructions:
          type: "subscription"
          steps:
            - "Contact Ludwig Boltzmann Institute for War Consequences Research"
            - "Access via University of Graz or Boltzmann Gesellschaft network"
            - "Some archival collections may require researcher credentials"
            - "Physical archive access in Graz"

  uk_archives:
    description: "United Kingdom government archives, intelligence services records, and military history collections"
    domains:
      - domain: nationalarchives.gov.uk
        name: "The National Archives (Kew)"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: PARTIALLY_DIGITIZED
        default_protocol: WEB_DIGITAL_REPOSITORY
        notes: "UK national archive with Discovery catalog. Holds MI5 records (KV series, WWI-1960s), GCHQ/signals intelligence (HW series, WWII Bletchley Park/Enigma), SOE operations (HS series). Millions of digitized records. Free onsite access, sign-in required for remote downloads. MI6/SIS records NOT available (agency retains under exemptions)."
        authentication:
          type: "credentials"
          username: ""
          password: ""
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://www.nationalarchives.gov.uk"
            - "Use Discovery catalog at https://discovery.nationalarchives.gov.uk/"
            - "Search MI5 files: department code 'KV' (KV1 reports, KV2 personal files, KV4 policy)"
            - "Search GCHQ/SIGINT: department code 'HW' (Bletchley Park, Enigma)"
            - "Search SOE: department code 'HS' (HS1-10 operations, HS9 personnel)"
            - "Download digitized records as PDF/images (sign-in required for remote)"
            - "Physical: Kew, Richmond, Surrey TW9 4DU"

      - domain: iwm.org.uk
        name: "Imperial War Museum Archives"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: PARTIALLY_DIGITIZED
        default_protocol: SEARCH_UI_ONLY
        notes: "Military history archives. Enemy Documents Section (EDS) Collection ~760 boxes of WWII captured documents. Private papers, photographs, sound recordings. Separate from National Archives."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://www.iwm.org.uk/collections"
            - "Search online catalog for documents, photographs, film, sound"
            - "Access EDS Collection for captured enemy documents (WWII)"
            - "Request appointments for reading room access"
            - "Physical: Lambeth Road, London SE1 6HZ"

      - domain: chu.cam.ac.uk
        name: "Churchill Archives Centre"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: PARTIALLY_DIGITIZED
        default_protocol: LIBRARY_CATALOGS
        notes: "Churchill College, Cambridge. Papers of Sir Winston Churchill and 600+ collections of prominent 20th century figures. Intelligence references in Churchill papers and related collections. Part of Cambridge University."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://www.chu.cam.ac.uk/archives/"
            - "Search online catalog for collections and finding aids"
            - "Churchill Papers (CHAR and CHUR) available"
            - "Request reading room appointments for access"
            - "Physical: Churchill College, Storey's Way, Cambridge CB3 0DS"

      - domain: bletchleypark.org.uk
        name: "Bletchley Park Trust"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: PARTIALLY_DIGITIZED
        default_protocol: HTML_CONTENT
        notes: "WWII codebreaking heritage site and museum. Historical exhibitions on Enigma, Colossus, Ultra intelligence. Note: Most official GCHQ/GCCS wartime records are at The National Archives under HW series. Site provides historical context and educational resources."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://bletchleypark.org.uk"
            - "Access online resources and historical articles"
            - "For official WWII SIGINT records, search TNA Discovery with 'HW' code"
            - "Physical museum: Bletchley Park, Sherwood Drive, Bletchley MK3 6EB"

  brazilian_archives:
