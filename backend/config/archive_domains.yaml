# Archive Domains Configuration for IntellyWeave
# Used by Quartermaster to constrain searches to curated archive sources
# Priority is dynamically assigned by Quartermaster based on user query intent

groups:
  russian_archives:
    description: "Russian state archives and Soviet repression memorial databases"
    domains:
      - domain: garf.ru
        name: "GARF - State Archive of the Russian Federation"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: PARTIALLY_DIGITIZED
        default_protocol: SEARCH_UI_ONLY
        notes: "Online catalog searchable at statearchive.ru. Some digitized collections available (Nicholas II, Soviet Military Admin). Most documents require physical visit to Moscow reading room."
        authentication:
          type: "none"
        access_instructions:
          type: "physical_archive"
          steps:
            - "Navigate to http://statearchive.ru/383 to search online catalog"
            - "Identify relevant fonds and prepare research list"
            - "Visit GARF at 119992 Moscow, ul. Bolshaia Pirogovskaia, 17"
            - "Reading room hours: Mon/Wed 12:00-20:00, Tue/Thu 10:00-17:00"
            - "Request documents by fond/opis/delo reference in reading room"

      - domain: stalin.memo.ru
        name: "Memorial - Stalin Era Database"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: FULLY_DIGITIZED
        default_protocol: SEARCH_UI_ONLY
        notes: "44,500 names from 383 Stalin-era execution lists (1937-1954). Full records viewable online. Data exportable as MySQL/CSV via GitHub."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://stalin.memo.ru"
            - "Use search functionality to query by name, region, or other fields"
            - "Browse regional lists or view individual person records"
            - "Optionally download datasets (MySQL, CSV) from linked GitHub repos for local analysis"

      - domain: base.memo.ru
        name: "Memorial - Repression Victims Database"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: FULLY_DIGITIZED
        default_protocol: SEARCH_UI_ONLY
        notes: "2.6+ million victims. Main database at lists.memo.ru. Full biographical records online. Data exportable as CSV/JSON/MySQL."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://lists.memo.ru (or base.memo.ru)"
            - "Enter search terms (name, place of work, region) in web search fields"
            - "Filter results by repression details or location"
            - "Click on result to view full biographical record"
            - "Optionally download datasets (CSV, JSON, MySQL) for local analysis"

      - domain: stopgulag.org
        name: "StopGulag.org - Ryazan Martyrology"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: PARTIALLY_DIGITIZED
        default_protocol: SEARCH_UI_ONLY
        notes: "Ryazan regional Gulag archive. 25+ collections covering execution lists, camps (Butovo, Vyazemilag, Dubravlag), deportees. Includes memoirs, photos, monuments."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://stopgulag.org"
            - "Use Names/Personalities section to search victim records"
            - "Browse Topics/Themes for specific camps or categories"
            - "Use Search function for targeted queries"
            - "Access related materials (memoirs, diaries, letters, photographs)"

      - domain: openlist.wiki
        name: "OpenList.wiki - Открытый список"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: FULLY_DIGITIZED
        default_protocol: WIKI_COLLABORATIVE
        notes: "3+ million USSR repression victims (1917-1991). Wikipedia-style collaborative wiki. Multi-language (RU/UK/GE/BY). Users can add/edit entries."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://ru.openlist.wiki (Russian) or https://openlist.wiki"
            - "Use 'Найти человека' (Find a person) search tool"
            - "Search by name, birth/death dates, residence"
            - "To contribute: register and use 'Добавить информацию' (Add information)"
            - "Can add photos, documents, biographical details"

      - domain: istmat.org
        name: "Istmat.org - Historical Materials Project"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: FULLY_DIGITIZED
        default_protocol: WEB_DIGITAL_REPOSITORY
        notes: "Digitized Soviet-era documents. Marxist-Leninist theory journals, economic/statistical reports, historical periodicals. Direct PDF downloads."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://istmat.org"
            - "Browse document categories or use search"
            - "Access files directly via /files/uploads/ paths"
            - "Download PDFs directly - no registration required"

  ukrainian_archives:
