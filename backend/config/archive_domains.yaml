            - "Register at https://sian.an.gov.br/ for online searches"
            - "Search digitized immigration records and passenger lists"
            - "Request scans via email: consultas@arquivonacional.gov.br"
            - "Physical: Rio de Janeiro or Brasília locations"

      - domain: cpdoc.fgv.br
