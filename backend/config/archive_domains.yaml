# Query expansion patterns for archive searches
# Used by Quartermaster to generate multilingual search variants
query_expansion:
  transliteration_variants:
    - language: ru
      pattern: "{name_cyrillic}"
    - language: uk
      pattern: "{name_ukrainian}"
    - language: de
      pattern: "{name_german}"
    - language: en
      pattern: "{name_english}"
    - language: pt
      pattern: "{name_portuguese}"
    - language: it
      pattern: "{name_italian}"
