        default_access_level: PUBLIC_OPEN
        default_digitization_status: PARTIALLY_DIGITIZED
        default_protocol: SEARCH_UI_ONLY
        notes: "Federal administrative and military records. Part of Österreichisches Staatsarchiv. Historical government documents, personnel files."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://www.bundesarchiv.at"
            - "Search online catalog for holdings"
            - "Request documents for reading room access"
            - "Contact for research assistance"

      - domain: iiif.onb.ac.at
        name: "Austrian National Library - IIIF API"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: FULLY_DIGITIZED
        default_protocol: API
        notes: "IIIF Image and Presentation API for digitized collections. Pre-1900 materials fully accessible via API. 1945-1954 content copyright-restricted to web interface only."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://iiif.onb.ac.at for API documentation"
