      - domain: planalto.gov.br
        name: "Presidência da República - Legislação Federal"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: FULLY_DIGITIZED
        default_protocol: WEB_DIGITAL_REPOSITORY
        notes: "Official Brazilian federal legislation repository. Full text of Constitution, Decree-Laws, Decrees, Laws, Provisional Measures from 1889 (Republic proclamation) to present. Maintained by Special Secretariat for Legal Affairs. Primary source for legal research including immigration law (Decreto-Lei 7967/45)."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://legislacao.presidencia.gov.br/ (primary) or https://www4.planalto.gov.br/legislacao"
            - "Browse by legislation type (Constituição, Leis, Decretos-Lei, Decretos, Medidas Provisórias)"
            - "Use search function for specific law numbers or keywords"
            - "Access full text of federal legislation in HTML format"
            - "Historical coverage includes legislation from D. Pedro I, D. Pedro II era onwards"

      - domain: imagem.sian.an.gov.br
        name: "SIAN - Sistema de Informações do Arquivo Nacional (Imaging)"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: PARTIALLY_DIGITIZED
        default_protocol: WEB_DIGITAL_REPOSITORY
        notes: "Digitized document imaging from Brazilian National Archives. Foreign national files (prontuários de estrangeiros) 1939-1987, foreigner entry records 1875-1987. Ship arrival lists at Brazilian ports (Santos, Rio de Janeiro). Part of collection digitized - records from multiple states available. Requires SIAN registration for advanced searches."
        authentication:
          type: "credentials"
          username: ""
          password: ""
        access_instructions:
          type: "general"
          steps:
            - "Navigate to https://sian.an.gov.br/ for catalog search"
            - "Register for free SIAN account for full access"
            - "Search FUNDO/COLEÇÕES tab using 'Pesquisa Multinível'"
            - "Use codes: RJANRIO OL (Rio 1875-1963), RJANRIO BS (Santos 1891-1982)"
            - "Search 'Prontuários de Estrangeiros' for foreign national files with name, parentage, registration city"
            - "Access digitized images at https://imagem.sian.an.gov.br/"

      - domain: hemeroteca-pdf.bn.gov.br
        name: "Hemeroteca Digital Brasileira - Biblioteca Nacional"
        default_access_level: PUBLIC_OPEN
        default_digitization_status: FULLY_DIGITIZED
        default_protocol: WEB_DIGITAL_REPOSITORY
        notes: "Brazilian National Library historical newspaper archive. ~8,000 newspaper/magazine titles from 1808 to present, 2.1M+ documents. Includes first Brazilian newspapers (Correio Braziliense, Gazeta do Rio de Janeiro 1808), Jornal do Brasil, Diário Carioca. OCR full-text searchable at 300+ dpi. Essential for historical research on Brazilian events and personalities."
        authentication:
          type: "none"
        access_instructions:
          type: "general"
          steps:
