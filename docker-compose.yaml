services:
  weaviate:
    command:
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    - --scheme
    - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.34.4
    ports:
    - 8080:8080
    - 50051:50051
    volumes:
    - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      CLUSTER_HOSTNAME: 'node1'

  # =====================================================================
  # Pipeline Watchdog — Monitors file ingestion and sends to Elysia API
  # =====================================================================
  pipeline-watchdog:
    build:
      context: ./backend/pipeline
      dockerfile: Dockerfile
    container_name: pipeline-watchdog
    env_file:
      - ./backend/pipeline/.env
    volumes:
      - ./backend/pipeline/input_files:/app/data
    restart: unless-stopped
    # Use host network to reach Elysia backend running on bare metal
    network_mode: host

volumes:
  weaviate_data:
