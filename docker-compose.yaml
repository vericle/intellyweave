services:
  weaviate:
    command:
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    - --scheme
    - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.34.4
    ports:
    - 8080:8080
    - 50051:50051
    volumes:
    - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      CLUSTER_HOSTNAME: 'node1'
    networks:
      - intellyweave-network

  # =====================================================================
  # IntellyWeave Backend — OSINT Analysis Platform with GLiNER
  # =====================================================================
  intellyweave:
    image: intellyweave:latest
    container_name: intellyweave
    # TEMPORARY: Run as root to allow spaCy model download at first startup
    # TODO: Rebuild image with pre-installed xx_ent_wiki_sm model and remove this
    user: "0"
    ports:
      - "8000:8000"
    depends_on:
      - weaviate
    networks:
      - intellyweave-network
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # HuggingFace cache (GLiNER model is pre-downloaded in image)
      HF_HOME: /app/.cache/huggingface

      # Weaviate Configuration (using docker network hostname)
      WEAVIATE_IS_LOCAL: "False"
      WEAVIATE_IS_CUSTOM: "True"
      CUSTOM_HTTP_HOST: weaviate
      CUSTOM_HTTP_PORT: "8080"
      CUSTOM_HTTP_SECURE: "False"
      CUSTOM_GRPC_HOST: weaviate
      CUSTOM_GRPC_PORT: "50051"
      CUSTOM_GRPC_SECURE: "False"

      # LLM Provider API Keys (set in .env file or environment)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      VOYAGEAI_API_KEY: ${VOYAGEAI_API_KEY:-}

      # Quartermaster and Case Officer API Keys
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      ARYN_API_KEY: ${ARYN_API_KEY:-}

      # Model Configuration (Anthropic Claude)
      BASE_MODEL: claude-haiku-4-5
      COMPLEX_MODEL: claude-haiku-4-5
      BASE_PROVIDER: anthropic
      COMPLEX_PROVIDER: anthropic

      # Application Configuration
      LOGGING_LEVEL: DEBUG
      ENVIRONMENT: production
      NODE_ENV: production

      # Geospatial Services
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      FIRST_START_ELYSIA: 1
      FERNET_KEY: ${FERNET_KEY:-}
    volumes:
      # Persist user configurations across container restarts
      - intellyweave-configs:/app/elysia/api/user_configs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # =====================================================================
  # Pipeline Watchdog — Monitors file ingestion and sends to Elysia API
  # =====================================================================
  pipeline-watchdog:
    build:
      context: ./backend/pipeline
      dockerfile: Dockerfile
    container_name: pipeline-watchdog
    env_file:
      - ./backend/pipeline/.env
    volumes:
      - ./backend/pipeline/input_files:/app/data
    restart: unless-stopped
    # Use host network to reach Elysia backend running on bare metal
    network_mode: host

volumes:
  weaviate_data:
  intellyweave-configs:

networks:
  intellyweave-network:
    driver: bridge
