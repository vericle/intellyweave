services:
  # DevOps AI Toolkit MCP Server
  dot-ai:
    image: ghcr.io/vfarcic/dot-ai:latest
    container_name: dot-ai
    network_mode: "host"
    environment:
      ANTHROPIC_API_KEY: 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
